services:
  # Resource budget for a 4 vCPU / 8 GB host:
  #   postgres   : 1.0 CPU / 1.0 GB
  #   app (JVM)  : 2.0 CPU / 2.0 GB
  #   inference  : 0.5 CPU / 0.5 GB
  #   media (SRS): 0.5 CPU / 0.25 GB
  #   redis      : 0.5 CPU / 0.25 GB
  #   frontend   : 0.25 CPU / 0.1 GB
  #   ----------------------------------
  #   total      : ~4.75 CPU / ~4.1 GB   (CPU is a soft cap, never all at once)
  postgres:
    image: postgres:17-alpine
    container_name: syncroom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - syncroom-network
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: syncroom-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "192mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    networks:
      - syncroom-network
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: syncroom-app
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:+UseG1GC -XX:MaxRAMPercentage=50 -XX:InitialRAMPercentage=25}
      SRS_HOST: ${SRS_HOST:-syncroom.ru}
      SRS_HLS_BASE_URL: ${SRS_HLS_BASE_URL:-https://syncroom.ru/live}
      SRS_RTMP_PORT: ${SRS_RTMP_PORT:-1935}
    depends_on:
      - postgres
      - redis
      - inference-mock
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./game-traces:/tmp/game-traces
      - ./data/storage:/tmp/syncroom-storage
    networks:
      - syncroom-network
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 2G
        reservations:
          cpus: "0.50"
          memory: 512M

  inference-mock:
    build:
      context: ./inference-mock
      dockerfile: Dockerfile
    container_name: syncroom-inference-mock
    restart: unless-stopped
    networks:
      - syncroom-network
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

  # SRS media server: RTMP intake on 1935, HLS on 8085.
  # Sized for ~30 concurrent HLS viewers of a single 720p/2.5 Mbit/s stream.
  media:
    image: ossrs/srs:5
    container_name: syncroom-media
    restart: unless-stopped
    ports:
      - "1935:1935"
      - "127.0.0.1:8085:8080"
    volumes:
      - ./srs.conf:/usr/local/srs/conf/docker.conf
    command: ./objs/srs -c conf/docker.conf
    depends_on:
      - app
    networks:
      - syncroom-network
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  frontend:
    build:
      context: ../SyncRoom-web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://syncroom.ru
        VITE_WS_URL: wss://syncroom.ru/ws-stomp
    container_name: syncroom-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    networks:
      - syncroom-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

volumes:
  postgres_data:
  redis_data:

networks:
  syncroom-network:
    driver: bridge
