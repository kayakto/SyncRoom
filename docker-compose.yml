version: '3.8'

services:
  # PostgreSQL база данных
  postgres:
    image: postgres:17-alpine
    container_name: syncroom-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-syncroom}
      POSTGRES_USER: ${DB_USERNAME:-syncroom}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-syncroom}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-syncroom} -d ${DB_NAME:-syncroom}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - syncroom-network

  # Spring Boot приложение
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: syncroom-app
    depends_on:
      postgres:
        condition: service_healthy
      inference-mock:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      DB_NAME: ${DB_NAME:-syncroom}
      DB_USERNAME: ${DB_USERNAME:-syncroom}
      DB_PASSWORD: ${DB_PASSWORD:-syncroom}
      JWT_SECRET: ${JWT_SECRET:-your-256-bit-secret-key-change-in-production-minimum-32-characters}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-900000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-2592000000}
      BOTS_INFERENCE_ENABLED: ${BOTS_INFERENCE_ENABLED:-true}
      BOTS_INFERENCE_DRAW_URL: ${BOTS_INFERENCE_DRAW_URL:-http://inference-mock:8091/api/draw}
      BOTS_INFERENCE_GUESS_URL: ${BOTS_INFERENCE_GUESS_URL:-http://inference-mock:8091/api/guess}
      BOTS_INFERENCE_TEXT_URL: ${BOTS_INFERENCE_TEXT_URL:-http://inference-mock:8091/api/text}
      GAMES_TRACE_DIR: ${GAMES_TRACE_DIR:-/tmp/game-traces}
      GAMES_TRACE_ENABLED: ${GAMES_TRACE_ENABLED:-true}
      GARTIC_ASSETS_DIR: ${GARTIC_ASSETS_DIR:-/tmp/gartic-assets}
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - ./game-traces:/tmp/game-traces
      - ./gartic-assets:/tmp/gartic-assets
    networks:
      - syncroom-network
    restart: unless-stopped

  # Local inference for game bots (DRAW/GUESS)
  inference-mock:
    build:
      context: ./inference-mock
      dockerfile: Dockerfile
    container_name: syncroom-inference-mock
    environment:
      INFERENCE_PROVIDER: ${INFERENCE_PROVIDER:-local}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_VISION_MODEL: ${OLLAMA_VISION_MODEL:-llava:7b}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-30m}
      LOCAL_DRAW_URL: ${LOCAL_DRAW_URL:-http://host.docker.internal:7860/sdapi/v1/txt2img}
      LOCAL_GUESS_URL: ${LOCAL_GUESS_URL:-}
    ports:
      - "${INFERENCE_PORT:-8091}:8091"
    networks:
      - syncroom-network
    restart: unless-stopped

  # SRS media server for RTMP → HLS streaming (Projector STREAM mode)
  media:
    image: ossrs/srs:5
    container_name: syncroom-media
    ports:
      - "1935:1935"   # RTMP — host streams from OBS/camera here
      - "8085:8080"   # HLS  — viewers pull .m3u8 from here
    volumes:
      - ./srs.conf:/usr/local/srs/conf/docker.conf
    command: ./objs/srs -c conf/docker.conf
    depends_on:
      - app
    networks:
      - syncroom-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  syncroom-network:
    driver: bridge
