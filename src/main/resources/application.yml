spring:
  application:
    name: syncroom
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    root: INFO
    ru.syncroom: DEBUG
    org.springframework.security: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# SRS media server — used for STREAM mode projector sessions
srs:
  host: ${SRS_HOST:localhost}

bots:
  inference:
    enabled: ${BOTS_INFERENCE_ENABLED:false}
    # Local or free Russian inference adapter endpoints.
    # Example:
    # draw-url: http://127.0.0.1:8091/api/draw
    # guess-url: http://127.0.0.1:8092/api/guess
    draw-url: ${BOTS_INFERENCE_DRAW_URL:}
    guess-url: ${BOTS_INFERENCE_GUESS_URL:}
