spring:
  application:
    name: syncroom
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 8080
  # За nginx / TLS: чтобы схема и host в запросе (и в OpenAPI для Swagger) были https и публичный домен.
  forward-headers-strategy: framework

logging:
  level:
    root: INFO
    ru.syncroom: DEBUG
    org.springframework.security: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# SRS media server — used for STREAM mode projector sessions
srs:
  host: ${SRS_HOST:localhost}

bots:
  inference:
    enabled: ${BOTS_INFERENCE_ENABLED:false}
    connect-timeout-ms: ${BOTS_INFERENCE_CONNECT_TIMEOUT_MS:15000}
    read-timeout-ms: ${BOTS_INFERENCE_READ_TIMEOUT_MS:120000}
    # Local or free Russian inference adapter endpoints.
    # Example:
    # draw-url: http://127.0.0.1:8091/api/draw
    # guess-url: http://127.0.0.1:8092/api/guess
    draw-url: ${BOTS_INFERENCE_DRAW_URL:}
    guess-url: ${BOTS_INFERENCE_GUESS_URL:}
    text-url: ${BOTS_INFERENCE_TEXT_URL:}

# Файлы Gartic и медиа: см. syncroom.storage (local: data-dir/gartic, s3: префикс в бакете).
games:
  bot:
    schedule-after-commit: ${GAMES_BOT_SCHEDULE_AFTER_COMMIT:true}
    # Temporary tuning knobs while validating image generation quality.
    draw-model-timeout-sec: ${GAMES_BOT_DRAW_MODEL_TIMEOUT_SEC:150}
  trace:
    enabled: ${GAMES_TRACE_ENABLED:true}
    dir: ${GAMES_TRACE_DIR:/tmp/game-traces}
  gartic:
    text-timeout-sec: ${GAMES_GARTIC_TEXT_TIMEOUT_SEC:60}
    draw-timeout-sec: ${GAMES_GARTIC_DRAW_TIMEOUT_SEC:180}

syncroom:
  storage:
    type: ${SYNCROOM_STORAGE_TYPE:local}
    # Публичный URL API (OAuth, local-аватары /api/media/...).
    public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:8080}
    # Для S3: URL CDN для прямых ссылок на файлы в бакете; если пусто — используется public-base-url.
    media-public-base-url: ${APP_CDN_PUBLIC_URL:}
    local:
      data-dir: ${SYNCROOM_STORAGE_LOCAL_DIR:./data/storage}
    s3:
      endpoint: ${S3_ENDPOINT:https://storage.yandexcloud.net}
      region: ${S3_REGION:ru-central1}
      bucket: ${S3_BUCKET:}
      access-key: ${S3_ACCESS_KEY:}
      secret-key: ${S3_SECRET_KEY:}
      key-prefix: ${S3_KEY_PREFIX:syncroom}

app:
  cors:
    # Comma-separated env override is supported by Spring for list properties:
    # APP_CORS_ALLOWED_ORIGINS=http://localhost:5173,http://web.local:5173
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  auth:
    cookies:
      access-token-name: ${APP_AUTH_COOKIES_ACCESS_TOKEN_NAME:SR_ACCESS_TOKEN}
      refresh-token-name: ${APP_AUTH_COOKIES_REFRESH_TOKEN_NAME:SR_REFRESH_TOKEN}
      domain: ${APP_AUTH_COOKIES_DOMAIN:}
      path: ${APP_AUTH_COOKIES_PATH:/}
      secure: ${APP_AUTH_COOKIES_SECURE:false}
      same-site: ${APP_AUTH_COOKIES_SAME_SITE:Lax}
    oauth:
      # Set exact callback URLs used by web/oauth clients
      vk-allowed-redirect-uris: ${APP_AUTH_OAUTH_VK_ALLOWED_REDIRECT_URIS:http://localhost:5173/auth/callback}
      yandex-allowed-redirect-uris: ${APP_AUTH_OAUTH_YANDEX_ALLOWED_REDIRECT_URIS:http://localhost:5173/auth/callback}
  projector:
    report-threshold: ${APP_PROJECTOR_REPORT_THRESHOLD:2}
  push:
    vapid-public-key: ${APP_PUSH_VAPID_PUBLIC_KEY:dev-vapid-public-key-placeholder}
  seat-bots:
    max-per-room: ${APP_SEAT_BOTS_MAX_PER_ROOM:3}
    study-helper-work-like-probability: ${APP_SEAT_BOTS_STUDY_LIKE_PROB:0.3}
    # Полный URL дефолтной аватарки seat-бота (CDN или /icons/... на API).
    default-avatar-url: ${APP_SEAT_BOT_DEFAULT_AVATAR_URL:/icons/icon-192.png}
    # Можно задать разные аватарки для каждого botType.
    work-focus-buddy-avatar-url: ${APP_SEAT_BOT_WORK_FOCUS_BUDDY_AVATAR_URL:}
    study-helper-avatar-url: ${APP_SEAT_BOT_STUDY_HELPER_AVATAR_URL:}
    sport-cheerleader-avatar-url: ${APP_SEAT_BOT_SPORT_CHEERLEADER_AVATAR_URL:}
