spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false # Отключаем Flyway для тестов, используем Hibernate DDL
  h2:
    console:
      enabled: true

jwt:
  secret: test-secret-key-for-jwt-token-generation-in-tests-minimum-32-chars
  access-token-expiration: 900000
  refresh-token-expiration: 2592000000

logging:
  level:
    root: WARN
    ru.syncroom: DEBUG
