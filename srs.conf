listen              1935;
# Sized for a 4 vCPU / 8 GB VPS with a ~100 Mbit/s shared uplink:
# ~40 HLS viewers at 720p/2.5 Mbit/s saturate the link long before this cap.
# The limit exists to protect file descriptors from runaway clients, not to
# advertise capacity.
max_connections     20;
daemon              off;
# Cap the per-connection send buffer so a slow viewer cannot pin RAM.
chunk_size          60000;

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
    # Allow browsers on another origin (Vite :5173, web :3000) to fetch .m3u8 via hls.js.
    crossdomain     on;
}

vhost __defaultVhost__ {
    # Disallow transcoding paths — SRS will only remux RTMP -> HLS, which is
    # almost free on CPU. This keeps the media container predictable.
    publish {
        # Drop the stream if no frames arrive for 10 s (zombie OBS sessions).
        normal_timeout  10000;
        # Reject unrealistic key-frame intervals; OBS default is 2 s.
        mr              off;
    }

    play {
        # Tight per-viewer queue: at 2.5 Mbit/s, 30 s is ~9 MB of RAM per viewer.
        # We keep it small because HLS players buffer on their side anyway.
        queue_length    10;
        mw_latency      350;
    }

    hls {
        enabled             on;
        hls_path            ./objs/nginx/html;
        hls_m3u8_file       [app]/[stream].m3u8;
        hls_ts_file           [app]/[stream]-[seq].ts;
        hls_fragment        2;
        hls_window          10;
        hls_cleanup         on;
        hls_dispose         30;
        # Start playlist after first segment (do not wait for keyframe forever).
        hls_wait_keyframe   off;
    }

    http_hooks {
        enabled         on;
        # Docker Compose service name is "app" (not container_name syncroom-app).
        on_publish      http://app:8080/api/projector/srs-callback;
        on_unpublish    http://app:8080/api/projector/srs-callback;
    }
}

# Match HTTP requests when nginx forwards Host: syncroom.ru (see docs/nginx).
vhost syncroom.ru {
    hls {
        enabled             on;
        hls_path            ./objs/nginx/html;
        hls_m3u8_file       [app]/[stream].m3u8;
        hls_ts_file           [app]/[stream]-[seq].ts;
        hls_fragment        2;
        hls_window          10;
        hls_cleanup         on;
        hls_dispose         30;
        hls_wait_keyframe   off;
    }

    http_hooks {
        enabled         on;
        on_publish      http://app:8080/api/projector/srs-callback;
        on_unpublish    http://app:8080/api/projector/srs-callback;
    }
}
