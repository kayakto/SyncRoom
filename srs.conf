listen              1935;
max_connections     1000;
daemon              off;

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

vhost __defaultVhost__ {
    hls {
        enabled         on;
        hls_fragment    2;   # 2-second fragments for lower latency
        hls_window      10;  # 10-second sliding window
    }

    http_hooks {
        enabled         on;
        # 'app' is the Spring Boot service name in docker-compose
        on_publish      http://app:8080/api/projector/srs-callback;
        on_unpublish    http://app:8080/api/projector/srs-callback;
    }
}
