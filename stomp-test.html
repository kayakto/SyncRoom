<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>SyncRoom WebSocket Tester</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: monospace; background: #1e1e2e; color: #cdd6f4; padding: 20px; max-width: 900px; margin: 0 auto; }
    input  { width: 100%; background: #313244; color: #cdd6f4; border: 1px solid #45475a;
             padding: 8px; border-radius: 4px; margin-bottom: 6px; }
    button { background: #89b4fa; color: #1e1e2e; border: none; padding: 7px 14px;
             border-radius: 4px; cursor: pointer; margin-right: 6px; margin-bottom: 6px; font-weight: bold; font-family: monospace; }
    button:hover   { filter: brightness(1.15); }
    button.red     { background: #f38ba8; }
    button.green   { background: #a6e3a1; }
    button.yellow  { background: #f9e2af; }
    button.sm      { font-size: 11px; padding: 4px 8px; }
    #log { background: #181825; border: 1px solid #45475a; padding: 12px; height: 380px;
           overflow-y: auto; border-radius: 4px; white-space: pre-wrap; word-break: break-all; }
    .in   { color: #a6e3a1; }
    .out  { color: #fab387; }
    .info { color: #89dceb; }
    .err  { color: #f38ba8; }
    .ts   { color: #6c7086; font-size: 11px; }
    h3    { color: #89b4fa; margin: 18px 0 6px; border-bottom: 1px solid #313244; padding-bottom: 4px; }
    .row  { display: flex; gap: 8px; align-items: flex-start; }
    .row input { margin-bottom: 0; }
    label { font-size: 12px; color: #6c7086; display: block; margin-bottom: 2px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  </style>
</head>
<body>
  <h2>🔌 SyncRoom STOMP Tester</h2>

  <!-- ─── ТОКЕН ─────────────────────────────────────────────────────────── -->
  <h3>1. JWT-токен</h3>
  <label>POST /api/auth/email → accessToken</label>
  <input id="token" type="text" placeholder="eyJhbGci..." />

  <!-- ─── ПОДКЛЮЧЕНИЕ ───────────────────────────────────────────────────── -->
  <h3>2. Подключение</h3>
  <button onclick="connect()">⚡ Connect</button>
  <button class="red" onclick="disconnect()">✖ Disconnect</button>

  <!-- ─── КОМНАТА ───────────────────────────────────────────────────────── -->
  <h3>3. Комната</h3>
  <div class="row">
    <div style="flex:1">
      <label>Room ID</label>
      <input id="roomId" placeholder="UUID из GET /api/rooms" />
    </div>
    <div style="padding-top:18px">
      <button onclick="loadRooms()">📋 GET /api/rooms</button>
      <button class="green"  onclick="joinRoom()">POST /join</button>
      <button class="red"    onclick="leaveRoom()">POST /leave</button>
      <button onclick="subRoom()">👂 Subscribe участники</button>
    </div>
  </div>

  <!-- ─── МЕСТА ─────────────────────────────────────────────────────────── -->
  <h3>4. Места (Seats)</h3>
  <div class="grid2">
    <div>
      <label>Room ID (для /seats топика)</label>
      <input id="seatRoomId" placeholder="UUID комнаты (= поле выше)" />
    </div>
    <div>
      <label>Seat ID</label>
      <input id="seatId" placeholder="UUID места (авто из GET /api/rooms)" />
    </div>
  </div>
  <button onclick="subSeats()">👂 Subscribe /seats</button>
  <button class="green"  onclick="sit()">🪑 POST /sit</button>
  <button class="yellow" onclick="standUp()">🚶 POST /leave seat</button>

  <!-- ─── ПРОЕКТОР ──────────────────────────────────────────────────────── -->
  <h3>5. Проектор (Embed & Stream)</h3>
  <div class="grid2">
    <div>
      <label>Room ID (для проектора)</label>
      <input id="projectorRoomId" placeholder="UUID комнаты (обычно = Room ID выше)" />
    </div>
    <div>
      <label>Mode</label>
      <input id="projectorMode" value="EMBED" placeholder="EMBED или STREAM" />
    </div>
  </div>
  <div class="grid2">
    <div>
      <label>Video URL (только для EMBED)</label>
      <input id="projectorVideoUrl" placeholder="https://vk.com/video_ext.php?..." />
    </div>
    <div>
      <label>Video title (опционально)</label>
      <input id="projectorVideoTitle" placeholder="Лекция по матану" />
    </div>
  </div>
  <div class="row">
    <button class="green" onclick="projectorStart()">▶ POST /projector (start)</button>
    <button class="red"   onclick="projectorStop()">⏹ DELETE /projector (stop)</button>
    <button onclick="subProjector()">👂 Subscribe /projector</button>
  </div>

  <div class="grid2">
    <div>
      <label>Control action (PLAY / PAUSE / SEEK)</label>
      <input id="projectorControlAction" value="PLAY" />
    </div>
    <div>
      <label>Position (ms)</label>
      <input id="projectorControlPos" value="0" />
    </div>
  </div>
  <button onclick="projectorControl()">🎛 SEND PROJECTOR_CONTROL (WS)</button>

  <!-- ─── ПОМОДОРО ──────────────────────────────────────────────────────── -->
  <h3>6. Помодоро (study-комнаты)</h3>
  <div class="grid2">
    <div>
      <label>Room ID (для помодоро)</label>
      <input id="pomodoroRoomId" placeholder="UUID комнаты (обычно = Room ID выше)" />
    </div>
    <div>
      <label>Work / Break / LongBreak / Rounds</label>
      <input id="pomodoroConfig" value="1500,300,900,4" placeholder="1500,300,900,4" />
    </div>
  </div>
  <div class="row">
    <button class="green" onclick="pomodoroStart()">▶ POST /pomodoro/start</button>
    <button onclick="pomodoroPause()">⏸ POST /pomodoro/pause</button>
    <button onclick="pomodoroResume()">⏯ POST /pomodoro/resume</button>
    <button onclick="pomodoroSkip()">⏭ POST /pomodoro/skip</button>
    <button class="red" onclick="pomodoroStop()">⏹ DELETE /pomodoro</button>
    <button onclick="subPomodoro()">👂 Subscribe /pomodoro</button>
  </div>

  <!-- ─── ИГРЫ (QUIPLASH + GARTIC) ──────────────────────────────────────── -->
  <h3>7. Игры (Quiplash + Gartic Phone)</h3>
  <div class="grid2">
    <div>
      <label>Room ID (для создания игры)</label>
      <input id="gameRoomId" placeholder="UUID комнаты (обычно = Room ID выше)" />
    </div>
    <div>
      <label>Game ID</label>
      <input id="gameId" placeholder="UUID игры (из ответа create/current)" />
    </div>
  </div>
  <div class="grid2">
    <div>
      <label>Game type</label>
      <input id="gameType" value="QUIPLASH" />
    </div>
    <div>
      <label>Answer / Vote answerId</label>
      <input id="gameActionValue" placeholder="text для SUBMIT_ANSWER или answerId для SUBMIT_VOTE" />
    </div>
  </div>
  <div class="grid2">
    <div>
      <label>Gartic text (SUBMIT_PHRASE / SUBMIT_GUESS)</label>
      <input id="garticTextValue" placeholder="Кот в космосе ест пиццу" />
    </div>
    <div>
      <label>Gartic: drawingAssetId (после POST multipart) — предпочтительно вместо base64</label>
      <input id="garticDrawingAssetId" placeholder="uuid из POST /api/games/{id}/gartic/drawings" />
    </div>
    <div>
      <label>Gartic legacy: data URL (если не используешь upload)</label>
      <input id="garticDrawingValue" placeholder="data:image/png;base64,..." />
    </div>
  </div>
  <div class="row" style="flex-wrap:wrap;align-items:center;margin-bottom:8px">
    <input type="file" id="garticPngFile" accept="image/png,image/jpeg,image/webp,image/gif" style="display:none" />
    <button type="button" onclick="document.getElementById('garticPngFile').click()">📎 Файл: PNG → сервер (рекоменд.) / иначе → base64</button>
    <button type="button" class="yellow" onclick="setTinyTestPng()">▫ Мини-PNG (1×1) в legacy-поле</button>
    <span style="font-size:11px;color:#6c7086">PNG: загрузка на сервер; остальные форматы — только base64 в legacy.</span>
  </div>
  <div class="grid2">
    <div>
      <label>STEP_GUESS: imageUrl (заполняется из WS автоматически)</label>
      <input id="garticGuessImageUrl" readonly placeholder="после STEP_GUESS" />
    </div>
    <div style="padding-top:18px">
      <button type="button" onclick="downloadGarticGuessPng()">⬇ Скачать PNG шага (GET + JWT)</button>
    </div>
  </div>
  <div class="row">
    <button class="green" onclick="gameCreate()">🎮 POST /games (create)</button>
    <button onclick="gameCurrent()">📋 GET /games/current</button>
    <button onclick="gameReady()">✅ POST /games/{id}/ready</button>
    <button onclick="gameUnready()">↩️ POST /games/{id}/unready</button>
    <button onclick="gameLeave()">🚪 POST /games/{id}/leave</button>
    <button onclick="gameStart()">🚀 POST /games/{id}/start</button>
    <button class="red" onclick="gameStop()">🛑 POST /games/{id}/stop</button>
    <button onclick="subGame()">👂 Subscribe /topic/game/{id}</button>
  </div>
  <div class="row">
    <button onclick="wsSubmitAnswer()">✍️ WS SUBMIT_ANSWER</button>
    <button onclick="wsSubmitVote()">🗳️ WS SUBMIT_VOTE</button>
    <button onclick="wsPlayerReady()">🙋 WS PLAYER_READY</button>
    <button onclick="wsPlayerUnready()">🙋 WS PLAYER_UNREADY</button>
    <button onclick="wsPlayerLeaveLobby()">🚪 WS PLAYER_LEAVE_LOBBY</button>
    <button onclick="wsSubmitPhrase()">📝 WS SUBMIT_PHRASE</button>
    <button onclick="wsSubmitDrawing()">🎨 WS SUBMIT_DRAWING</button>
    <button onclick="wsSubmitGuess()">🔎 WS SUBMIT_GUESS</button>
  </div>

  <!-- ─── ЧАТ КОМНАТЫ ───────────────────────────────────────────────────── -->
  <h3>8. Чат комнаты</h3>
  <div class="grid2">
    <div>
      <label>Текст сообщения (REST + WS)</label>
      <input id="chatMessageText" value="Привет из stomp-test!" />
    </div>
    <div>
      <label>page / size (только GET history)</label>
      <input id="chatPageSize" value="0,50" placeholder="0,50" />
    </div>
  </div>
  <div class="row">
    <button onclick="chatHistory()">📜 GET /messages (history)</button>
    <button onclick="subChat()">👂 Subscribe /topic/room/{roomId}/chat</button>
    <button class="green" onclick="chatSendWs()">💬 WS SEND /app/room/{roomId}/chat</button>
  </div>

  <!-- ─── ЛОГ ───────────────────────────────────────────────────────────── -->
  <h3>9. Лог</h3>
  <button class="sm" onclick="clearLog()">Очистить</button>
  <div id="log"></div>

  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
  <script>
    let stompClient = null;
    let roomSub = null;
    let seatSub = null;
    let projectorSub = null;
    let pomodoroSub = null;
    let gameSub = null;
    let gameUserSub = null;
    let chatSub = null;

    /* ── helpers ─────────────────────────────────────────────────── */
    const $ = id => document.getElementById(id);
    const tok  = () => $('token').value.trim();
    const rid  = () => $('roomId').value.trim();
    const srid = () => $('seatRoomId').value.trim() || rid();
    const prid = () => $('projectorRoomId').value.trim() || rid();
    const pridPomodoro = () => $('pomodoroRoomId').value.trim() || rid();
    const sid  = () => $('seatId').value.trim();
    const grid = () => $('gameRoomId').value.trim() || rid();
    const gid  = () => $('gameId').value.trim();

    function log(msg, cls = 'info') {
      const el = $('log');
      const ts = new Date().toLocaleTimeString('ru', {hour12:false, fractionalSecondDigits:3});
      el.innerHTML += `<div><span class="ts">[${ts}]</span> <span class="${cls}">${esc(msg)}</span></div>`;
      el.scrollTop = el.scrollHeight;
    }
    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function clearLog() { $('log').innerHTML = ''; }

    /* ── STOMP ───────────────────────────────────────────────────── */
    function connect() {
      if (!tok()) { log('⚠️ Введи токен', 'err'); return; }
      const socket = new WebSocket('ws://localhost:8080/ws-stomp');
      stompClient = Stomp.over(socket);
      stompClient.debug = msg => { if (msg.includes('ERROR')) log('DBG: '+msg, 'err'); };
      stompClient.connect({'Authorization': 'Bearer '+tok()},
        () => log('✅ CONNECTED', 'in'),
        e  => log('❌ STOMP error: '+e, 'err')
      );
      log('⏳ Connecting to ws://localhost:8080/ws-stomp...', 'out');
    }

    function disconnect() {
      if (stompClient) stompClient.disconnect(() => log('🔌 Disconnected', 'info'));
    }

    function subRoom() {
      if (!chk()) return;
      if (!rid()) { log('⚠️ Введи roomId', 'err'); return; }
      if (roomSub) roomSub.unsubscribe();
      const dest = '/topic/room/'+rid();
      roomSub = stompClient.subscribe(dest, frame => {
        const e = parseEvent(frame.body);
        log('👥 ['+e.type+'] '+JSON.stringify(e.payload, null, 2), 'in');
      });
      log('👂 Subscribed: '+dest, 'out');
    }

    function subSeats() {
      if (!chk()) return;
      const r = srid();
      if (!r) { log('⚠️ Введи Room ID', 'err'); return; }
      if (seatSub) seatSub.unsubscribe();
      const dest = '/topic/room/'+r+'/seats';
      seatSub = stompClient.subscribe(dest, frame => {
        const e = parseEvent(frame.body);
        log('🪑 ['+e.type+'] '+JSON.stringify(e.payload, null, 2), 'in');
        // auto-fill seatId on SEAT_TAKEN
        if (e.type === 'SEAT_TAKEN' && e.payload?.seatId)
          $('seatId').value = e.payload.seatId;
      });
      log('👂 Subscribed: '+dest, 'out');
      log('Нажми /sit чтобы увидеть SEAT_TAKEN. /leave seat чтобы SEAT_LEFT.', 'info');
    }

    function subProjector() {
      if (!chk()) return;
      const r = prid();
      if (!r) { log('⚠️ Введи Room ID для проектора', 'err'); return; }
      if (projectorSub) projectorSub.unsubscribe();
      const dest = '/topic/room/'+r+'/projector';
      projectorSub = stompClient.subscribe(dest, frame => {
        const e = parseEvent(frame.body);
        log('📽 ['+e.type+'] '+JSON.stringify(e.payload, null, 2), 'in');
      });
      log('👂 Subscribed: '+dest, 'out');
      log('Используй POST /projector и PROJECTOR_CONTROL, чтобы увидеть события PROJECTOR_STARTED / CONTROL / STREAM_LIVE / STREAM_OFFLINE.', 'info');
    }

    function subPomodoro() {
      if (!chk()) return;
      const r = pridPomodoro();
      if (!r) { log('⚠️ Введи Room ID для помодоро', 'err'); return; }
      if (pomodoroSub) pomodoroSub.unsubscribe();
      const dest = '/topic/room/'+r+'/pomodoro';
      pomodoroSub = stompClient.subscribe(dest, frame => {
        const e = parseEvent(frame.body);
        log('⏱ ['+e.type+'] '+JSON.stringify(e.payload, null, 2), 'in');
      });
      log('👂 Subscribed: '+dest, 'out');
      log('Используй POST /pomodoro/start/pause/resume/skip/stop, чтобы увидеть события POMODORO_*.', 'info');
    }

    function subChat() {
      if (!chk()) return;
      const r = rid();
      if (!r) { log('⚠️ Введи Room ID', 'err'); return; }
      if (chatSub) chatSub.unsubscribe();
      const dest = '/topic/room/' + r + '/chat';
      chatSub = stompClient.subscribe(dest, frame => {
        log('💬 [chat] ' + frame.body, 'in');
      });
      log('👂 Subscribed: ' + dest, 'out');
      log('Сперва POST /join в эту комнату. Сообщения приходят как JSON: id, userId, userName, text, createdAt.', 'info');
    }

    function chatHistory() {
      const r = rid();
      if (!r) { log('⚠️ Введи Room ID', 'err'); return; }
      let page = 0, size = 50;
      const ps = $('chatPageSize').value.trim();
      if (ps) {
        const parts = ps.split(',').map(x => parseInt(x.trim(), 10));
        if (!isNaN(parts[0])) page = parts[0];
        if (parts.length > 1 && !isNaN(parts[1])) size = parts[1];
      }
      api('GET', `/api/rooms/${r}/messages?page=${page}&size=${size}`);
    }

    function chatSendWs() {
      if (!chk()) return;
      const r = rid();
      if (!r) { log('⚠️ Введи Room ID', 'err'); return; }
      const text = $('chatMessageText').value.trim();
      if (!text) { log('⚠️ Пустой текст', 'err'); return; }
      const dest = '/app/room/' + r + '/chat';
      const payload = { text };
      log('WS SEND ' + dest + ': ' + JSON.stringify(payload), 'out');
      stompClient.send(dest, {}, JSON.stringify(payload));
    }

    function subGame() {
      if (!chk()) return;
      const g = gid();
      if (!g) { log('⚠️ Введи Game ID', 'err'); return; }
      if (gameSub) gameSub.unsubscribe();
      if (gameUserSub) gameUserSub.unsubscribe();
      const dest = '/topic/game/' + g;
      gameSub = stompClient.subscribe(dest, frame => {
        const e = parseEvent(frame.body);
        log('🎲 [' + e.type + '] ' + JSON.stringify(e.payload, null, 2), 'in');
      });
      log('👂 Subscribed: ' + dest, 'out');
      // Личные шаги Gartic (STEP_WRITE / STEP_DRAW / STEP_GUESS) шлются только сюда, не в /topic
      const userDest = '/user/topic/game/' + g;
      gameUserSub = stompClient.subscribe(userDest, frame => {
        const e = parseEvent(frame.body);
        let shown = e.payload;
        if (e.type === 'STEP_GUESS' && e.payload && e.payload.imageUrl) {
          $('garticGuessImageUrl').value = fullApiUrl(e.payload.imageUrl);
          log('🖼 STEP_GUESS: картинка по HTTP: ' + $('garticGuessImageUrl').value + ' (кнопка «Скачать PNG»)', 'info');
          shown = { ...e.payload };
          if (shown.imageBase64 && String(shown.imageBase64).length > 120) {
            shown = { ...shown, imageBase64: shown.imageBase64.slice(0, 80) + '… (truncated)' };
          }
        }
        log('👉 [ЛИЧНО ' + e.type + '] ' + JSON.stringify(shown, null, 2), 'in');
      });
      log('👂 Subscribed (твои шаги игры): ' + userDest, 'out');
      log('Создай игру, ready, start. Команды игры — только когда пришёл STEP_* в личный топик.', 'info');
    }

    function parseEvent(body) {
      try { return JSON.parse(body); } catch(_) { return { type: 'RAW', payload: body }; }
    }

    function apiOrigin() {
      return 'http://localhost:8080';
    }

    function fullApiUrl(path) {
      if (!path) return '';
      if (String(path).startsWith('http')) return path;
      return apiOrigin() + path;
    }

    async function downloadGarticGuessPng() {
      const u = $('garticGuessImageUrl').value.trim();
      if (!u) { log('⚠️ Нет URL — дождись STEP_GUESS с imageUrl', 'err'); return; }
      log('➡️ GET ' + u + ' (binary)', 'out');
      try {
        const r = await fetch(u, { headers: { 'Authorization': 'Bearer ' + tok() } });
        if (!r.ok) { log('← ' + r.status + ' ошибка скачивания', 'err'); return; }
        const blob = await r.blob();
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'gartic-guess.png';
        a.click();
        URL.revokeObjectURL(a.href);
        log('← PNG сохранён локально', 'in');
      } catch (e) { log('❌ ' + e, 'err'); }
    }

    function chk() {
      if (!stompClient || !stompClient.connected) { log('⚠️ Сначала подключись (Connect)', 'err'); return false; }
      return true;
    }

    /* ── REST ────────────────────────────────────────────────────── */
    function api(method, url) {
      log(`➡️ ${method} ${url}`, 'out');
      return fetch(apiOrigin()+url, {
        method,
        headers: {
          'Authorization': 'Bearer '+tok(),
          'Content-Type': 'application/json'
        }
      }).then(async r => {
        let txt = await r.text();
        try { txt = JSON.stringify(JSON.parse(txt), null, 2); } catch(_) {}
        log(`← ${r.status}: ${txt}`, r.ok ? 'in' : 'err');
        return { ok: r.ok, text: txt };
      }).catch(e => log('❌ '+e, 'err'));
    }

    function loadRooms() {
      api('GET', '/api/rooms').then(r => {
        if (!r?.ok) return;
        try {
          const rooms = JSON.parse(r.text);
          rooms.forEach(rm => {
            const free = rm.seats?.filter(s => !s.occupiedBy);
            log(`🏠 ${rm.title} [${rm.id}] участников:${rm.participantCount}/${rm.maxParticipants} мест свободно:${free?.length??'?'}`, 'info');
          });
          // auto-fill first room + first free seat
          if (rooms.length > 0) {
            $('roomId').value = rooms[0].id;
            $('seatRoomId').value = rooms[0].id;
            const free = rooms[0].seats?.find(s => !s.occupiedBy);
            if (free) {
              $('seatId').value = free.id;
              log(`✅ Авто: roomId=${rooms[0].id} seatId=${free.id}`, 'in');
            }
          }
        } catch(_) {}
      });
    }

    function joinRoom()  { if (!rid()) { log('⚠️ Введи roomId', 'err'); return; } api('POST', '/api/rooms/'+rid()+'/join'); }
    function leaveRoom() { if (!rid()) { log('⚠️ Введи roomId', 'err'); return; } api('POST', '/api/rooms/'+rid()+'/leave'); }

    function sit() {
      if (!srid() || !sid()) { log('⚠️ Нужны Room ID и Seat ID (нажми GET /api/rooms)', 'err'); return; }
      api('POST', `/api/rooms/${srid()}/seats/${sid()}/sit`);
    }

    function standUp() {
      if (!srid() || !sid()) { log('⚠️ Нужны Room ID и Seat ID', 'err'); return; }
      api('POST', `/api/rooms/${srid()}/seats/${sid()}/leave`);
    }

    /* ── ПРОЕКТОР REST + WS ─────────────────────────────────────────────── */

    function projectorStart() {
      const r = prid();
      if (!r) { log('⚠️ Нужен Room ID для проектора', 'err'); return; }
      const mode = $('projectorMode').value.trim().toUpperCase() || 'EMBED';
      const body = { mode, videoTitle: $('projectorVideoTitle').value.trim() || null };
      if (mode === 'EMBED') {
        if (!$('projectorVideoUrl').value.trim()) {
          log('⚠️ Для EMBED нужно заполнить Video URL', 'err');
          return;
        }
        body.videoUrl = $('projectorVideoUrl').value.trim();
      }
      const url = `/api/rooms/${r}/projector`;
      log(`➡️ POST ${url} body=${JSON.stringify(body)}`, 'out');
      fetch('http://localhost:8080'+url, {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer '+tok(),
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      }).then(async res => {
        let txt = await res.text();
        try { txt = JSON.stringify(JSON.parse(txt), null, 2); } catch(_) {}
        log(`← ${res.status}: ${txt}`, res.ok ? 'in' : 'err');
      }).catch(e => log('❌ '+e, 'err'));
    }

    function projectorStop() {
      const r = prid();
      if (!r) { log('⚠️ Нужен Room ID для проектора', 'err'); return; }
      api('DELETE', `/api/rooms/${r}/projector`);
    }

    function projectorControl() {
      if (!chk()) return;
      const r = prid();
      if (!r) { log('⚠️ Нужен Room ID для проектора', 'err'); return; }
      const action = $('projectorControlAction').value.trim().toUpperCase() || 'PLAY';
      const pos = parseInt($('projectorControlPos').value.trim() || '0', 10) || 0;
      const dest = `/app/room/${r}/projector/control`;
      const payload = { action, positionMs: pos };
      log(`WS SEND ${dest}: `+JSON.stringify(payload), 'out');
      stompClient.send(dest, {}, JSON.stringify(payload));
    }

    /* ── ПОМОДОРО REST ──────────────────────────────────────────────────── */

    function parsePomodoroConfig() {
      const raw = $('pomodoroConfig').value.trim();
      if (!raw) return {};
      const parts = raw.split(',').map(x => parseInt(x.trim(), 10)).filter(x => !isNaN(x));
      const [work, brk, longBrk, rounds] = parts;
      const body = {};
      if (work) body.workDuration = work;
      if (brk) body.breakDuration = brk;
      if (longBrk) body.longBreakDuration = longBrk;
      if (rounds) body.roundsTotal = rounds;
      return body;
    }

    function pomodoroStart() {
      const r = pridPomodoro();
      if (!r) { log('⚠️ Нужен Room ID для помодоро', 'err'); return; }
      const body = parsePomodoroConfig();
      const url = `/api/rooms/${r}/pomodoro/start`;
      log(`➡️ POST ${url} body=${JSON.stringify(body)}`, 'out');
      fetch('http://localhost:8080'+url, {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer '+tok(),
          'Content-Type': 'application/json'
        },
        body: Object.keys(body).length ? JSON.stringify(body) : '{}'
      }).then(async res => {
        let txt = await res.text();
        try { txt = JSON.stringify(JSON.parse(txt), null, 2); } catch(_) {}
        log(`← ${res.status}: ${txt}`, res.ok ? 'in' : 'err');
      }).catch(e => log('❌ '+e, 'err'));
    }

    function pomodoroPause() {
      const r = pridPomodoro();

    }

    function pomodoroResume() {

      if (!r) { log('⚠️ Нужен Room ID для помодоро', 'err'); return; }
      api('POST', `/api/rooms/${r}/pomodoro/resume`);
    }

    function pomodoroSkip() {
      const r = pridPomodoro();
      if (!r) { log('⚠️ Нужен Room ID для помодоро', 'err'); return; }
      api('POST', `/api/rooms/${r}/pomodoro/skip`);
    }

    function pomodoroStop() {
      const r = pridPomodoro();
      if (!r) { log('⚠️ Нужен Room ID для помодоро', 'err'); return; }
      api('DELETE', `/api/rooms/${r}/pomodoro`);
    }

    /* ── ИГРЫ REST + WS ─────────────────────────────────────────────────── */

    function gameCreate() {
      const r = grid();
      if (!r) { log('⚠️ Нужен Room ID для create game', 'err'); return; }
      const gameType = $('gameType').value.trim().toUpperCase() || 'QUIPLASH';
      const body = { gameType };
      const url = `/api/rooms/${r}/games`;
      log(`➡️ POST ${url} body=${JSON.stringify(body)}`, 'out');
      fetch('http://localhost:8080' + url, {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + tok(), 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      }).then(async res => {
        let txt = await res.text();
        let parsed = null;
        try { parsed = JSON.parse(txt); txt = JSON.stringify(parsed, null, 2); } catch(_) {}
        log(`← ${res.status}: ${txt}`, res.ok ? 'in' : 'err');
        if (parsed?.gameId) {
          $('gameId').value = parsed.gameId;
          log(`✅ Авто: gameId=${parsed.gameId}`, 'in');
        }
      }).catch(e => log('❌ ' + e, 'err'));
    }

    function gameCurrent() {
      const r = grid();
      if (!r) { log('⚠️ Нужен Room ID для current game', 'err'); return; }
      const url = `/api/rooms/${r}/games/current`;
      api('GET', url).then(resp => {
        if (!resp?.ok) return;
        try {
          const parsed = JSON.parse(resp.text);
          if (parsed?.gameId) $('gameId').value = parsed.gameId;
        } catch (_) {}
      });
    }

    function gameReady() {
      const g = gid();

      api('POST', `/api/games/${g}/ready`);

    /** 1×1 white PNG — валидный минимальный тест (как белый холст в игре). */
    function setTinyTestPng() {
      const u = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMBAAZ9l1cAAAAASUVORK5CYII=';
      $('garticDrawingValue').value = u;
      log('Заполнено поле рисунка: мини-PNG 1×1 (data URL).', 'info');
    }

    $('garticPngFile').addEventListener('change', async function (ev) {
      const f = ev.target.files && ev.target.files[0];
      ev.target.value = '';
      if (!f) return;
      if (f.type === 'image/png') {
        const g = gid();
        if (!g) { log('⚠️ Введи Game ID для POST upload', 'err'); return; }
        if (!tok()) { log('⚠️ Нужен JWT в поле токена', 'err'); return; }
        const fd = new FormData();
        fd.append('file', f, f.name || 'draw.png');
        log('➡️ POST ' + apiOrigin() + '/api/games/' + g + '/gartic/drawings (multipart)', 'out');
        try {
          const r = await fetch(apiOrigin() + '/api/games/' + g + '/gartic/drawings', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + tok() },
            body: fd
          });
          const txt = await r.text();
          log('← ' + r.status + ': ' + txt, r.ok ? 'in' : 'err');
          if (!r.ok) return;
          const j = JSON.parse(txt);
          $('garticDrawingAssetId').value = j.drawingAssetId || '';
          log('✅ Жми SUBMIT_DRAWING — уйдёт drawingAssetId без base64 в WebSocket', 'info');
        } catch (e) { log('❌ ' + e, 'err'); }
        return;
      }
      const reader = new FileReader();
      reader.onload = function () {
        const dataUrl = String(reader.result || '');
        if (!dataUrl.startsWith('data:image')) {
          log('⚠️ Ожидался data URL картинки', 'err');
          return;
        }
        $('garticDrawingValue').value = dataUrl;
        $('garticDrawingAssetId').value = '';
        log('Картинка в legacy-поле (data URL), длина: ' + dataUrl.length + '. Жми SUBMIT_DRAWING.', 'in');
      };
      reader.onerror = function () { log('⚠️ Не удалось прочитать файл', 'err'); };
      reader.readAsDataURL(f);
    });

    function wsSubmitDrawing() {
      if (!chk()) return;
      const g = gid();
      if (!g) { log('⚠️ Нужен Game ID', 'err'); return; }
      const dest = `/app/game/${g}/action`;
      const assetId = $('garticDrawingAssetId').value.trim();
      let payload;
      if (assetId) {
        payload = { type: 'SUBMIT_DRAWING', payload: { drawingAssetId: assetId } };
        log(`WS SEND ${dest}: ` + JSON.stringify(payload), 'out');
      } else {
        const imageBase64 = $('garticDrawingValue').value.trim() ||
          'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMBAAZ9l1cAAAAASUVORK5CYII=';
        payload = { type: 'SUBMIT_DRAWING', payload: { imageBase64 } };
        const preview = imageBase64.length > 120 ? imageBase64.slice(0, 80) + '… (' + imageBase64.length + ' chars)' : imageBase64;
        log(`WS SEND ${dest}: {"type":"SUBMIT_DRAWING","payload":{"imageBase64":"${preview}"}}`, 'out');
      }
      stompClient.send(dest, {}, JSON.stringify(payload));
    }

    function wsSubmitGuess() {
      if (!chk()) return;
      const g = gid();
      if (!g) { log('⚠️ Нужен Game ID', 'err'); return; }
      const text = $('garticTextValue').value.trim() || '...';
      const payload = { type: 'SUBMIT_GUESS', payload: { text } };
      const dest = `/app/game/${g}/action`;
      log(`WS SEND ${dest}: ` + JSON.stringify(payload), 'out');
      stompClient.send(dest, {}, JSON.stringify(payload));
    }
