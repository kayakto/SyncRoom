<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>SyncRoom WebSocket Tester</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: monospace; background: #1e1e2e; color: #cdd6f4; padding: 20px; max-width: 900px; margin: 0 auto; }
    input  { width: 100%; background: #313244; color: #cdd6f4; border: 1px solid #45475a;
             padding: 8px; border-radius: 4px; margin-bottom: 6px; }
    button { background: #89b4fa; color: #1e1e2e; border: none; padding: 7px 14px;
             border-radius: 4px; cursor: pointer; margin-right: 6px; margin-bottom: 6px; font-weight: bold; font-family: monospace; }
    button:hover   { filter: brightness(1.15); }
    button.red     { background: #f38ba8; }
    button.green   { background: #a6e3a1; }
    button.yellow  { background: #f9e2af; }
    button.sm      { font-size: 11px; padding: 4px 8px; }
    #log { background: #181825; border: 1px solid #45475a; padding: 12px; height: 380px;
           overflow-y: auto; border-radius: 4px; white-space: pre-wrap; word-break: break-all; }
    .in   { color: #a6e3a1; }
    .out  { color: #fab387; }
    .info { color: #89dceb; }
    .err  { color: #f38ba8; }
    .ts   { color: #6c7086; font-size: 11px; }
    h3    { color: #89b4fa; margin: 18px 0 6px; border-bottom: 1px solid #313244; padding-bottom: 4px; }
    .row  { display: flex; gap: 8px; align-items: flex-start; }
    .row input { margin-bottom: 0; }
    label { font-size: 12px; color: #6c7086; display: block; margin-bottom: 2px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  </style>
</head>
<body>
  <h2>🔌 SyncRoom STOMP Tester</h2>

  <!-- ─── ТОКЕН ─────────────────────────────────────────────────────────── -->
  <h3>1. JWT-токен</h3>
  <label>POST /api/auth/email → accessToken</label>
  <input id="token" type="text" placeholder="eyJhbGci..." />

  <!-- ─── ПОДКЛЮЧЕНИЕ ───────────────────────────────────────────────────── -->
  <h3>2. Подключение</h3>
  <button onclick="connect()">⚡ Connect</button>
  <button class="red" onclick="disconnect()">✖ Disconnect</button>

  <!-- ─── КОМНАТА ───────────────────────────────────────────────────────── -->
  <h3>3. Комната</h3>
  <div class="row">
    <div style="flex:1">
      <label>Room ID</label>
      <input id="roomId" placeholder="UUID из GET /api/rooms" />
    </div>
    <div style="padding-top:18px">
      <button onclick="loadRooms()">📋 GET /api/rooms</button>
      <button class="green"  onclick="joinRoom()">POST /join</button>
      <button class="red"    onclick="leaveRoom()">POST /leave</button>
      <button onclick="subRoom()">👂 Subscribe участники</button>
    </div>
  </div>

  <!-- ─── МЕСТА ─────────────────────────────────────────────────────────── -->
  <h3>4. Места (Seats)</h3>
  <div class="grid2">
    <div>
      <label>Room ID (для /seats топика)</label>
      <input id="seatRoomId" placeholder="UUID комнаты (= поле выше)" />
    </div>
    <div>
      <label>Seat ID</label>
      <input id="seatId" placeholder="UUID места (авто из GET /api/rooms)" />
    </div>
  </div>
  <button onclick="subSeats()">👂 Subscribe /seats</button>
  <button class="green"  onclick="sit()">🪑 POST /sit</button>
  <button class="yellow" onclick="standUp()">🚶 POST /leave seat</button>

  <!-- ─── ПРОЕКТОР ──────────────────────────────────────────────────────── -->
  <h3>5. Проектор (Embed & Stream)</h3>
  <div class="grid2">
    <div>
      <label>Room ID (для проектора)</label>
      <input id="projectorRoomId" placeholder="UUID комнаты (обычно = Room ID выше)" />
    </div>
    <div>
      <label>Mode</label>
      <input id="projectorMode" value="EMBED" placeholder="EMBED или STREAM" />
    </div>
  </div>
  <div class="grid2">
    <div>
      <label>Video URL (только для EMBED)</label>
      <input id="projectorVideoUrl" placeholder="https://vk.com/video_ext.php?..." />
    </div>
    <div>
      <label>Video title (опционально)</label>
      <input id="projectorVideoTitle" placeholder="Лекция по матану" />
    </div>
  </div>
  <div class="row">
    <button class="green" onclick="projectorStart()">▶ POST /projector (start)</button>
    <button class="red"   onclick="projectorStop()">⏹ DELETE /projector (stop)</button>
    <button onclick="subProjector()">👂 Subscribe /projector</button>
  </div>

  <div class="grid2">
    <div>
      <label>Control action (PLAY / PAUSE / SEEK)</label>
      <input id="projectorControlAction" value="PLAY" />
    </div>
    <div>
      <label>Position (ms)</label>
      <input id="projectorControlPos" value="0" />
    </div>
  </div>
  <button onclick="projectorControl()">🎛 SEND PROJECTOR_CONTROL (WS)</button>

  <!-- ─── ПОМОДОРО ──────────────────────────────────────────────────────── -->
  <h3>6. Помодоро (study-комнаты)</h3>
  <div class="grid2">
    <div>
      <label>Room ID (для помодоро)</label>
      <input id="pomodoroRoomId" placeholder="UUID комнаты (обычно = Room ID выше)" />
    </div>
    <div>
      <label>Work / Break / LongBreak / Rounds</label>
      <input id="pomodoroConfig" value="1500,300,900,4" placeholder="1500,300,900,4" />
    </div>
  </div>
  <div class="row">
    <button class="green" onclick="pomodoroStart()">▶ POST /pomodoro/start</button>
    <button onclick="pomodoroPause()">⏸ POST /pomodoro/pause</button>
    <button onclick="pomodoroResume()">⏯ POST /pomodoro/resume</button>
    <button onclick="pomodoroSkip()">⏭ POST /pomodoro/skip</button>
    <button class="red" onclick="pomodoroStop()">⏹ DELETE /pomodoro</button>
    <button onclick="subPomodoro()">👂 Subscribe /pomodoro</button>
  </div>

  <!-- ─── ЛОГ ───────────────────────────────────────────────────────────── -->
  <h3>7. Лог</h3>
  <button class="sm" onclick="clearLog()">Очистить</button>
  <div id="log"></div>

  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
  <script>
    let stompClient = null;
    let roomSub = null;
    let seatSub = null;
    let projectorSub = null;
    let pomodoroSub = null;

    /* ── helpers ─────────────────────────────────────────────────── */
    const $ = id => document.getElementById(id);
    const tok  = () => $('token').value.trim();
    const rid  = () => $('roomId').value.trim();
    const srid = () => $('seatRoomId').value.trim() || rid();
    const prid = () => $('projectorRoomId').value.trim() || rid();
    const pridPomodoro = () => $('pomodoroRoomId').value.trim() || rid();
    const sid  = () => $('seatId').value.trim();

    function log(msg, cls = 'info') {
      const el = $('log');
      const ts = new Date().toLocaleTimeString('ru', {hour12:false, fractionalSecondDigits:3});
      el.innerHTML += `<div><span class="ts">[${ts}]</span> <span class="${cls}">${esc(msg)}</span></div>`;
      el.scrollTop = el.scrollHeight;
    }
    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function clearLog() { $('log').innerHTML = ''; }

    /* ── STOMP ───────────────────────────────────────────────────── */
    function connect() {
      if (!tok()) { log('⚠️ Введи токен', 'err'); return; }
      const socket = new WebSocket('ws://localhost:8080/ws-stomp');
      stompClient = Stomp.over(socket);
      stompClient.debug = msg => { if (msg.includes('ERROR')) log('DBG: '+msg, 'err'); };
      stompClient.connect({'Authorization': 'Bearer '+tok()},
        () => log('✅ CONNECTED', 'in'),
        e  => log('❌ STOMP error: '+e, 'err')
      );
      log('⏳ Connecting to ws://localhost:8080/ws-stomp...', 'out');
    }

    function disconnect() {
      if (stompClient) stompClient.disconnect(() => log('🔌 Disconnected', 'info'));
    }

    function subRoom() {
      if (!chk()) return;
      if (!rid()) { log('⚠️ Введи roomId', 'err'); return; }
      if (roomSub) roomSub.unsubscribe();
      const dest = '/topic/room/'+rid();
      roomSub = stompClient.subscribe(dest, frame => {
        const e = parseEvent(frame.body);
        log('👥 ['+e.type+'] '+JSON.stringify(e.payload, null, 2), 'in');
      });
      log('👂 Subscribed: '+dest, 'out');
    }

    function subSeats() {
      if (!chk()) return;
      const r = srid();
      if (!r) { log('⚠️ Введи Room ID', 'err'); return; }
      if (seatSub) seatSub.unsubscribe();
      const dest = '/topic/room/'+r+'/seats';
      seatSub = stompClient.subscribe(dest, frame => {
        const e = parseEvent(frame.body);
        log('🪑 ['+e.type+'] '+JSON.stringify(e.payload, null, 2), 'in');
        // auto-fill seatId on SEAT_TAKEN
        if (e.type === 'SEAT_TAKEN' && e.payload?.seatId)
          $('seatId').value = e.payload.seatId;
      });
      log('👂 Subscribed: '+dest, 'out');
      log('Нажми /sit чтобы увидеть SEAT_TAKEN. /leave seat чтобы SEAT_LEFT.', 'info');
    }

    function subProjector() {
      if (!chk()) return;
      const r = prid();
      if (!r) { log('⚠️ Введи Room ID для проектора', 'err'); return; }
      if (projectorSub) projectorSub.unsubscribe();
      const dest = '/topic/room/'+r+'/projector';
      projectorSub = stompClient.subscribe(dest, frame => {
        const e = parseEvent(frame.body);
        log('📽 ['+e.type+'] '+JSON.stringify(e.payload, null, 2), 'in');
      });
      log('👂 Subscribed: '+dest, 'out');
      log('Используй POST /projector и PROJECTOR_CONTROL, чтобы увидеть события PROJECTOR_STARTED / CONTROL / STREAM_LIVE / STREAM_OFFLINE.', 'info');
    }

    function subPomodoro() {
      if (!chk()) return;
      const r = pridPomodoro();
      if (!r) { log('⚠️ Введи Room ID для помодоро', 'err'); return; }
      if (pomodoroSub) pomodoroSub.unsubscribe();
      const dest = '/topic/room/'+r+'/pomodoro';
      pomodoroSub = stompClient.subscribe(dest, frame => {
        const e = parseEvent(frame.body);
        log('⏱ ['+e.type+'] '+JSON.stringify(e.payload, null, 2), 'in');
      });
      log('👂 Subscribed: '+dest, 'out');
      log('Используй POST /pomodoro/start/pause/resume/skip/stop, чтобы увидеть события POMODORO_*.', 'info');
    }

    function parseEvent(body) {
      try { return JSON.parse(body); } catch(_) { return { type: 'RAW', payload: body }; }
    }

    function chk() {
      if (!stompClient || !stompClient.connected) { log('⚠️ Сначала подключись (Connect)', 'err'); return false; }
      return true;
    }

    /* ── REST ────────────────────────────────────────────────────── */
    function api(method, url) {
      log(`➡️ ${method} ${url}`, 'out');
      return fetch('http://localhost:8080'+url, {
        method,
        headers: {
          'Authorization': 'Bearer '+tok(),
          'Content-Type': 'application/json'
        }
      }).then(async r => {
        let txt = await r.text();
        try { txt = JSON.stringify(JSON.parse(txt), null, 2); } catch(_) {}
        log(`← ${r.status}: ${txt}`, r.ok ? 'in' : 'err');
        return { ok: r.ok, text: txt };
      }).catch(e => log('❌ '+e, 'err'));
    }

    function loadRooms() {
      api('GET', '/api/rooms').then(r => {
        if (!r?.ok) return;
        try {
          const rooms = JSON.parse(r.text);
          rooms.forEach(rm => {
            const free = rm.seats?.filter(s => !s.occupiedBy);
            log(`🏠 ${rm.title} [${rm.id}] участников:${rm.participantCount}/${rm.maxParticipants} мест свободно:${free?.length??'?'}`, 'info');
          });
          // auto-fill first room + first free seat
          if (rooms.length > 0) {
            $('roomId').value = rooms[0].id;
            $('seatRoomId').value = rooms[0].id;
            const free = rooms[0].seats?.find(s => !s.occupiedBy);
            if (free) {
              $('seatId').value = free.id;
              log(`✅ Авто: roomId=${rooms[0].id} seatId=${free.id}`, 'in');
            }
          }
        } catch(_) {}
      });
    }

    function joinRoom()  { if (!rid()) { log('⚠️ Введи roomId', 'err'); return; } api('POST', '/api/rooms/'+rid()+'/join'); }
    function leaveRoom() { if (!rid()) { log('⚠️ Введи roomId', 'err'); return; } api('POST', '/api/rooms/'+rid()+'/leave'); }

    function sit() {
      if (!srid() || !sid()) { log('⚠️ Нужны Room ID и Seat ID (нажми GET /api/rooms)', 'err'); return; }
      api('POST', `/api/rooms/${srid()}/seats/${sid()}/sit`);
    }

    function standUp() {
      if (!srid() || !sid()) { log('⚠️ Нужны Room ID и Seat ID', 'err'); return; }
      api('POST', `/api/rooms/${srid()}/seats/${sid()}/leave`);
    }

    /* ── ПРОЕКТОР REST + WS ─────────────────────────────────────────────── */

    function projectorStart() {
      const r = prid();
      if (!r) { log('⚠️ Нужен Room ID для проектора', 'err'); return; }
      const mode = $('projectorMode').value.trim().toUpperCase() || 'EMBED';
      const body = { mode, videoTitle: $('projectorVideoTitle').value.trim() || null };
      if (mode === 'EMBED') {
        if (!$('projectorVideoUrl').value.trim()) {
          log('⚠️ Для EMBED нужно заполнить Video URL', 'err');
          return;
        }
        body.videoUrl = $('projectorVideoUrl').value.trim();
      }
      const url = `/api/rooms/${r}/projector`;
      log(`➡️ POST ${url} body=${JSON.stringify(body)}`, 'out');
      fetch('http://localhost:8080'+url, {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer '+tok(),
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      }).then(async res => {
        let txt = await res.text();
        try { txt = JSON.stringify(JSON.parse(txt), null, 2); } catch(_) {}
        log(`← ${res.status}: ${txt}`, res.ok ? 'in' : 'err');
      }).catch(e => log('❌ '+e, 'err'));
    }

    function projectorStop() {
      const r = prid();
      if (!r) { log('⚠️ Нужен Room ID для проектора', 'err'); return; }
      api('DELETE', `/api/rooms/${r}/projector`);
    }

    function projectorControl() {
      if (!chk()) return;
      const r = prid();
      if (!r) { log('⚠️ Нужен Room ID для проектора', 'err'); return; }
      const action = $('projectorControlAction').value.trim().toUpperCase() || 'PLAY';
      const pos = parseInt($('projectorControlPos').value.trim() || '0', 10) || 0;
      const dest = `/app/room/${r}/projector/control`;
      const payload = { action, positionMs: pos };
      log(`WS SEND ${dest}: `+JSON.stringify(payload), 'out');
      stompClient.send(dest, {}, JSON.stringify(payload));
    }

    /* ── ПОМОДОРО REST ──────────────────────────────────────────────────── */

    function parsePomodoroConfig() {
      const raw = $('pomodoroConfig').value.trim();
      if (!raw) return {};
      const parts = raw.split(',').map(x => parseInt(x.trim(), 10)).filter(x => !isNaN(x));
      const [work, brk, longBrk, rounds] = parts;
      const body = {};
      if (work) body.workDuration = work;
      if (brk) body.breakDuration = brk;
      if (longBrk) body.longBreakDuration = longBrk;
      if (rounds) body.roundsTotal = rounds;
      return body;
    }

    function pomodoroStart() {
      const r = pridPomodoro();
      if (!r) { log('⚠️ Нужен Room ID для помодоро', 'err'); return; }
      const body = parsePomodoroConfig();
      const url = `/api/rooms/${r}/pomodoro/start`;
      log(`➡️ POST ${url} body=${JSON.stringify(body)}`, 'out');
      fetch('http://localhost:8080'+url, {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer '+tok(),
          'Content-Type': 'application/json'
        },
        body: Object.keys(body).length ? JSON.stringify(body) : '{}'
      }).then(async res => {
        let txt = await res.text();
        try { txt = JSON.stringify(JSON.parse(txt), null, 2); } catch(_) {}
        log(`← ${res.status}: ${txt}`, res.ok ? 'in' : 'err');
      }).catch(e => log('❌ '+e, 'err'));
    }

    function pomodoroPause() {
      const r = pridPomodoro();
      if (!r) { log('⚠️ Нужен Room ID для помодоро', 'err'); return; }
      api('POST', `/api/rooms/${r}/pomodoro/pause`);
    }

    function pomodoroResume() {
      const r = pridPomodoro();
      if (!r) { log('⚠️ Нужен Room ID для помодоро', 'err'); return; }
      api('POST', `/api/rooms/${r}/pomodoro/resume`);
    }

    function pomodoroSkip() {
      const r = pridPomodoro();
      if (!r) { log('⚠️ Нужен Room ID для помодоро', 'err'); return; }
      api('POST', `/api/rooms/${r}/pomodoro/skip`);
    }

    function pomodoroStop() {
      const r = pridPomodoro();
      if (!r) { log('⚠️ Нужен Room ID для помодоро', 'err'); return; }
      api('DELETE', `/api/rooms/${r}/pomodoro`);
    }
  </script>
</body>
</html>
